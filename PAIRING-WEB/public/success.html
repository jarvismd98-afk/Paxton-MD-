<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAXTON-MD | Success</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="orb"></div>
    <div class="orb orb-2"></div>
    
    <div class="container">
        <div class="logo">
            <div class="logo-icon">✅</div>
        </div>
        <h1 class="gradient-text">Success!</h1>
        <div class="subtitle">Your session has been generated</div>
        
        <div class="session-box">
            <div class="session-label">
                <i class="fas fa-cloud-upload-alt"></i> Session uploaded to Mega
            </div>
            <div class="session-id" id="sessionId">Loading...</div>
            
            <div class="features-grid" style="margin-top: 20px;">
                <div class="feature-card">
                    <div class="feature-icon">1️⃣</div>
                    <div class="feature-title">Copy Session</div>
                    <div class="feature-desc">Click copy button</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">2️⃣</div>
                    <div class="feature-title">Paste in Bot</div>
                    <div class="feature-desc">Add to config</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">3️⃣</div>
                    <div class="feature-title">Restart</div>
                    <div class="feature-desc">Start the bot</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">4️⃣</div>
                    <div class="feature-title">Enjoy!</div>
                    <div class="feature-desc">140+ commands</div>
                </div>
            </div>
            
            <button class="copy-btn" onclick="copySessionId()">
                <i class="fas fa-copy"></i> Copy Session ID
            </button>
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <a href="/" class="btn" style="flex: 1;">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="https://github.com/jarvismd98-afk/Paxton-MD-.git" target="_blank" class="btn btn-outline" style="flex: 1;">
                <i class="fab fa-github"></i> Repository
            </a>
        </div>
        
        <div class="footer">
            <p><i class="fas fa-shield-alt"></i> Session sent to your WhatsApp</p>
            <p id="phoneDisplay"></p>
            <p>❤️🥺 Multi device bot by Paxton ❤️🥺</p>
        </div>
    </div>
    
    <script>
        function getSessionIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('session') || 'PAXTON-MD-SESSION';
        }
        
        function getPhoneFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('phone') || '27836547695';
        }
        
        document.getElementById('sessionId').innerText = getSessionIdFromUrl();
        document.getElementById('phoneDisplay').innerHTML = `<i class="fas fa-phone"></i> Session sent to: ${getPhoneFromUrl()}`;
        
        function copySessionId() {
            const sessionId = document.getElementById('sessionId').innerText;
            navigator.clipboard.writeText(sessionId).then(() => {
                alert('✅ Session ID copied to clipboard!');
            });
        }
    </script>
</body>
</html>
