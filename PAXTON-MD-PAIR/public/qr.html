<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAXTON-MD | QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .qr-container {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        #qrCode {
            max-width: 300px;
            margin: 0 auto;
            display: block;
        }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: #f5f5f5;
            color: #666;
        }
        
        .status.connected {
            background: #e8f5e9;
            color: #4CAF50;
            border-left: 5px solid #4CAF50;
        }
        
        .session-result {
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
            border-left: 5px solid #4CAF50;
            display: none;
        }
        
        .session-result.active {
            display: block;
        }
        
        .session-id {
            background: white;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid #4CAF50;
        }
        
        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
        }
        
        .back-btn {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            color: #856404;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 QR Code</h1>
            <p>Scan QR code with WhatsApp to connect</p>
        </div>
        
        <div class="qr-container">
            <div class="loader" id="loader"></div>
            <img id="qrCode" style="display: none;" alt="QR Code">
        </div>
        
        <div class="status" id="status">
            Generating QR code...
        </div>
        
        <div class="session-result" id="sessionResult">
            <h3>✅ Session Generated Successfully!</h3>
            <p>Your session ID (Mega file ID):</p>
            <div class="session-id" id="sessionId"></div>
            <button class="copy-btn" onclick="copySessionId()">Copy Session ID</button>
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
        
        <div class="note">
            <strong>📝 Note:</strong>
            <p>1. Open WhatsApp on your phone</p>
            <p>2. Go to Linked Devices</p>
            <p>3. Tap "Link a Device"</p>
            <p>4. Scan this QR code</p>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // QR page functionality would go here
        // Similar to pair.html but with QR code display
    </script>
</body>
</html>
